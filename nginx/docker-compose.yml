services:
  nginx:
    image: nginx:latest
    container_name: nginx
    env_file:
      - ../.env
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf.template:/tmp/nginx.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    entrypoint: ["/bin/bash", "-c", "envsubst '$$NEXTCLOUD_DOMAIN $$CRAFTY_DOMAIN' < /tmp/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"]
    restart: unless-stopped
    networks:
      - homelab

networks:
  homelab:
    external: true